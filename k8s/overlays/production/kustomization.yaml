apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - namespace.yaml
  - ../../base

patches:
  # Example of production sizing beyond the base default -- adjust per load.
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

# CI updates the tag below during deploy (next phase) -- never "latest".
images:
  - name: PLACEHOLDER/devops-assessment-backend
    newName: iahmedmusa/devops-assessment-backend
    newTag: "0.1.0"
  - name: PLACEHOLDER/devops-assessment-frontend
    newName: iahmedmusa/devops-assessment-frontend
    newTag: "0.1.0"
