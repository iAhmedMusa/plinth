apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plinth-ci

resources:
  - namespace.yaml
  - ../../base

# Mirrors overlays/staging. The tag below is a placeholder only -- the
# deploy-staging job overwrites it at run time with `kustomize edit set
# image`, pinning the exact version just built and pushed.
images:
  - name: PLACEHOLDER/plinth-backend
    newName: ahmedmusa/plinth-backend
    newTag: "0.1.2"
  - name: PLACEHOLDER/plinth-frontend
    newName: ahmedmusa/plinth-frontend
    newTag: "0.1.2"
