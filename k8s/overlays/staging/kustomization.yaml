apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plinth-staging

resources:
  - namespace.yaml
  - ../../base

# CI updates the tag below during deploy (next phase) -- never "latest".
images:
  - name: PLACEHOLDER/plinth-backend
    newName: ahmedmusa/plinth-backend
    newTag: "0.1.2"
  - name: PLACEHOLDER/plinth-frontend
    newName: ahmedmusa/plinth-frontend
    newTag: "0.1.2"
