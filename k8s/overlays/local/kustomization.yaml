apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plinth-local

resources:
  - namespace.yaml
  - ../../base

# Real Docker Hub images + a concrete tag, set here so the placeholder in
# base/ never has to change. Swap the repository below for your own
# Docker Hub user if different.
images:
  - name: PLACEHOLDER/plinth-backend
    newName: ahmedmusa/plinth-backend
    newTag: "0.1.2"
  - name: PLACEHOLDER/plinth-frontend
    newName: ahmedmusa/plinth-frontend
    newTag: "0.1.2"
