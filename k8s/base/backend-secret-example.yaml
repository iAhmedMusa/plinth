# =============================================================================
# EXAMPLE ONLY -- never commit real secrets to this file or any overlay.
#
# In production this object is NOT applied from the repo. It is created by
# External Secrets Operator (or the CSI Secrets Store driver) pulling from
# Azure Key Vault / AWS Secrets Manager / GCP Secret Manager. This file exists
# so `kubectl apply -k overlays/local` works out of the box for local dev.
# The local overlay may patch these values; staging/production overlays must
# NOT reference this file for real credentials.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # local/base default matches postgres.yaml's dev credentials; staging and
  # production overlays MUST patch this with real managed-DB credentials
  # from a real secret manager -- never edit this file with real values.
  DATABASE_URL: "postgresql+asyncpg://appuser:CHANGE_ME@postgres:5432/appdb"
