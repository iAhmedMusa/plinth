name: CI/CD

on:
  pull_request:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      # No database service needed: the suite overrides the DB dependency
      # with an in-memory SQLite engine.
      - name: Run tests
        working-directory: backend
        run: pytest -v

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      # Build-time only: next build validates the rewrites() destination,
      # it is never a real network call in this job.
      - name: Build (smoke test)
        working-directory: frontend
        env:
          BACKEND_URL: http://backend:8080
        run: npm run build

  build-and-push:
    name: Build and push images
    needs: [test-backend, test-frontend]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tags.outputs.version }}
      sha: ${{ steps.tags.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: tags
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${{ steps.tags.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${{ steps.tags.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${{ steps.tags.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${{ steps.tags.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Report-only: exit-code 0 so an unresolved CVE never blocks a
      # release. A production gate would use exit-code 1 with a maintained
      # .trivyignore allowlist for accepted findings instead of a blanket
      # pass.
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${{ steps.tags.outputs.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"
          output: "trivy-backend.txt"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${{ steps.tags.outputs.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"
          output: "trivy-frontend.txt"

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-*.txt

  # MOCK JOB — does not authenticate against AWS or push anything. It only
  # echoes the command sequence a real ECR push would run, so the shape of
  # the pipeline is provable today and the mock steps can be swapped for
  # real ones later without restructuring the job graph.
  mock-ecr-push:
    name: "[MOCK] Push to ECR"
    needs: build-and-push
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Mock ECR push
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          echo "MOCK ONLY — no AWS credentials configured, nothing below is executed against a real account."
          echo
          echo "aws ecr get-login-password --region <aws-region> \\"
          echo "  | docker login --username AWS --password-stdin <aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com"
          echo "docker tag ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${VERSION} \\"
          echo "  <aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/devops-assessment-backend:${VERSION}"
          echo "docker push <aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/devops-assessment-backend:${VERSION}"
          echo "docker tag ${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${VERSION} \\"
          echo "  <aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/devops-assessment-frontend:${VERSION}"
          echo "docker push <aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/devops-assessment-frontend:${VERSION}"

      # Real implementation would drop long-lived AWS access keys entirely
      # and authenticate via GitHub OIDC federation:
      #   - uses: aws-actions/configure-aws-credentials@v4
      #     with:
      #       role-to-assume: arn:aws:iam::<aws-account-id>:role/gha-ecr-push
      #       aws-region: <aws-region>
      # The workflow requests a short-lived token from AWS STS at run time;
      # no cloud secret is ever stored in the repo.

  release:
    name: Create GitHub release
    needs: build-and-push
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Images published to Docker Hub:

            - `${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${{ needs.build-and-push.outputs.version }}`
            - `${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${{ needs.build-and-push.outputs.sha }}`
            - `${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${{ needs.build-and-push.outputs.version }}`
            - `${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${{ needs.build-and-push.outputs.sha }}`

  # Real deploy onto an ephemeral kind cluster created inside the runner --
  # it proves the manifests and the just-built images actually come up
  # together, not just that the YAML parses. The cluster is created and
  # destroyed within this job; nothing here is a persistent environment.
  # A managed staging cluster (AKS/EKS) would replace kind with a kubectl
  # context swap authenticated via OIDC -- the job graph and every step
  # below stay the same.
  deploy-staging:
    name: "Deploy to staging (kind)"
    needs: [release, build-and-push]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: staging
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}
      NAMESPACE: devops-assessment-ci
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: devops-assessment-ci
          config: .github/kind/kind-config.yaml

      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s

      - uses: imranismail/setup-kustomize@v3.0.0

      - name: Pin overlay images to this release
        working-directory: k8s/overlays/ci
        run: |
          kustomize edit set image \
            "PLACEHOLDER/devops-assessment-backend=${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${VERSION}" \
            "PLACEHOLDER/devops-assessment-frontend=${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${VERSION}"

      - name: Deploy manifests
        run: kubectl apply -k k8s/overlays/ci

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n "$NAMESPACE" --timeout=180s
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=180s

      - name: Smoke test — backend health from inside the cluster
        run: |
          kubectl exec -n "$NAMESPACE" deploy/frontend -- \
            wget -qO- --timeout=5 http://backend:8080/health

      - name: Smoke test — ingress reachable from the runner
        # ingress-nginx's pod can report Ready before it finishes
        # programming the nginx config for a freshly-applied Ingress, so
        # the first request or two can 503 -- retry instead of a single shot.
        run: |
          curl --fail --retry 5 --retry-delay 3 --retry-all-errors \
            --resolve devops.localtest.me:80:127.0.0.1 \
            http://devops.localtest.me/

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide
          kubectl describe pods -n "$NAMESPACE"
          kubectl logs -n "$NAMESPACE" -l app.kubernetes.io/component=backend --all-containers --tail=200
          kubectl logs -n "$NAMESPACE" -l app.kubernetes.io/component=frontend --all-containers --tail=200

  # MOCK JOB — promotes the SAME immutable image tags built above into
  # production; no rebuild happens between environments. The pause for
  # manual approval before this job starts is not expressed anywhere in
  # this YAML — it comes entirely from the "production" GitHub environment
  # having a required-reviewer protection rule configured in repo settings.
  deploy-production:
    name: "[MOCK] Deploy to production"
    needs: [deploy-staging, build-and-push]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Mock deploy to production
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          echo "MOCK ONLY — no cluster is configured, nothing below is executed."
          echo
          echo "kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-backend:${VERSION} -n production"
          echo "kubectl set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/devops-assessment-frontend:${VERSION} -n production"
          echo "kubectl rollout status deployment/backend -n production"
          echo "kubectl rollout status deployment/frontend -n production"

      # Stays mocked: no real production cluster exists, and the point of
      # this job is the required-reviewer gate on the "production"
      # environment, not the deploy mechanics. A managed cluster would
      # swap in azure/k8s-deploy or kubectl against AKS/EKS, authenticated
      # via OIDC (no stored cloud keys) -- same job graph, same gate.
